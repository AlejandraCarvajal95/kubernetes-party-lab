apiVersion: v1
kind: Pod
metadata:
  name: rave-master-sebastianrivera
  namespace: techno
  annotations:
    student: "Jhoan Sebastian Rivera"
    music: "Techno - Bass Boost"
spec:
  containers:
    - name: dj
      image: nginx
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: style
                operator: In
                values:
                  - electronico
