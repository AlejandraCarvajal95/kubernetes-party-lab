apiVersion: v1
kind: Pod
metadata:
  name: sabor-total
  namespace: salsa
  annotations:
    student: "Camilo Andres Munoz"
    music: "Salsa - Sabor Latino"
spec:
  containers:
    - name: salsero
      image: nginx
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: style
                operator: In
                values:
                  - latino
