apiVersion: v1
kind: Pod
metadata:
  name: perreador-maximo
  namespace: reggaeton
  annotations:
    student: "NOMBRE DEL ESTUDIANTE"
    music: "Reggaeton - Perreo Intenso"
spec:
  containers:
    - name: reggaetonero
      image: nginx
  tolerations:
    - key: "music"
      operator: "Equal"
      value: "perreo-intenso"
      effect: "NoSchedule"
